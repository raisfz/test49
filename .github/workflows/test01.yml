name: Mirror Upstream (Force Except Custom Files)

on:
  schedule:
    - cron: "0 * */7 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Save local files
        run: |
          mkdir -p /tmp/backup
          
          if [ -d ".github/workflows" ]; then
            cp -r .github/workflows /tmp/backup/
          fi
          
          if [ -f "index.html" ]; then
            cp index.html /tmp/backup/
          fi

          if [ -d "_posts" ]; then
            cp -r _posts /tmp/backup/
          fi

          if [ -d "_includes/indri" ]; then
            mkdir -p /tmp/backup/_includes
            cp -r _includes/indri /tmp/backup/_includes/
          fi

      - name: Add upstream
        run: |
          git remote remove upstream || true
          git remote add upstream https://github.com/nengmaya538/nengmaya538.github.io.git
          git fetch upstream

      - name: Hard reset to upstream
        run: |
          git reset --hard upstream/master

      - name: Restore excluded files
        run: |
          rm -rf .github/workflows
          rm -rf _posts
          rm -rf _includes/indri
          
          if [ -d "/tmp/backup/workflows" ]; then
            mkdir -p .github
            cp -r /tmp/backup/workflows .github/
          fi
          
          if [ -f "/tmp/backup/index.html" ]; then
            cp /tmp/backup/index.html index.html
          fi

          if [ -d "/tmp/backup/_posts" ]; then
            cp -r /tmp/backup/_posts .
          fi

          if [ -d "/tmp/backup/_includes/indri" ]; then
            mkdir -p _includes
            cp -r /tmp/backup/_includes/indri _includes/
          fi

      - name: Force push to fork
        run: |
          git add .
          git commit -m "Force sync except workflows, index.html, _posts and _includes/indri" || echo "No changes"
          git push origin master --force
